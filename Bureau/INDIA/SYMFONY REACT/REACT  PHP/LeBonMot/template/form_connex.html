<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <!-- Google-like Login Form -->
    <div class="g-wrap">
        <div class="g-card">
            <div class="g-logo">G</div>
            <h1 class="g-title">Connexion</h1>
            <p class="g-subtitle">Accédez à votre espace d’apprentissage</p>
    
            <form class="g-form" method="POST" action="login.php" autocomplete="on">
                <div class="g-field">
                    <input id="email" name="email" type="email" placeholder=" " required />
                    <label for="email">Adresse e-mail</label>
                </div>
    
                <div class="g-field">
                    <input id="password" name="password" type="password" placeholder=" " required />
                    <label for="password">Mot de passe</label>
                </div>
    
                <div class="g-row">
                    <label class="g-check">
                        <input type="checkbox" name="remember" />
                        <span>Rester connecté</span>
                    </label>
                    <a class="g-link" href="forgot.php">Mot de passe oublié ?</a>
                </div>
    
                <div class="g-actions">
                    <a class="g-link" href="register.php">Créer un compte</a>
                    <button class="g-btn" type="submit">Se connecter</button>
                </div>
            </form>
        </div>
    </div>
    
    <style>
        :root {
            --bg: #f6f8fc;
            --card: #fff;
            --text: #202124;
            --muted: #5f6368;
            --border: #dadce0;
            --focus: #1a73e8;
            --shadow: 0 10px 30px rgba(0, 0, 0, .08);
            --radius: 18px;
        }
    
        * {
            box-sizing: border-box
        }
    
        body {
            margin: 0;
            font-family: Arial, Helvetica, sans-serif;
            background: var(--bg);
            color: var(--text);
        }
    
        .g-wrap {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 24px;
        }
    
        .g-card {
            width: 100%;
            max-width: 420px;
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            box-shadow: var(--shadow);
            padding: 28px 28px 22px;
        }
    
        .g-logo {
            width: 42px;
            height: 42px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 800;
            border: 1px solid var(--border);
            margin-bottom: 14px;
            user-select: none;
        }
    
        .g-title {
            margin: 0 0 6px;
            font-size: 26px;
            font-weight: 700;
            letter-spacing: -.2px;
        }
    
        .g-subtitle {
            margin: 0 0 18px;
            color: var(--muted);
            font-size: 14px;
            line-height: 1.4;
        }
    
        .g-form {
            display: flex;
            flex-direction: column;
            gap: 14px
        }
    
        /* Floating label field */
        .g-field {
            position: relative;
            padding-top: 6px;
        }
    
        .g-field input {
            width: 100%;
            height: 54px;
            border: 1px solid var(--border);
            border-radius: 10px;
            outline: none;
            padding: 18px 14px 10px;
            font-size: 15px;
            transition: border .2s, box-shadow .2s;
            background: #fff;
        }
    
        .g-field label {
            position: absolute;
            left: 14px;
            top: 22px;
            color: var(--muted);
            font-size: 15px;
            pointer-events: none;
            transition: all .15s ease;
            background: #fff;
            padding: 0 4px;
        }
    
        .g-field input:focus {
            border-color: var(--focus);
            box-shadow: 0 0 0 3px rgba(26, 115, 232, .15);
        }
    
        .g-field input:focus+label,
        .g-field input:not(:placeholder-shown)+label {
            top: 2px;
            font-size: 12px;
            color: var(--focus);
        }
    
        .g-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 12px;
            flex-wrap: wrap;
            margin-top: -2px;
        }
    
        .g-check {
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 13px;
            color: var(--muted);
            user-select: none;
        }
    
        .g-check input {
            width: 16px;
            height: 16px;
            accent-color: var(--focus);
        }
    
        .g-link {
            color: var(--focus);
            text-decoration: none;
            font-size: 13px;
            font-weight: 600;
        }
    
        .g-link:hover {
            text-decoration: underline;
        }
    
        .g-actions {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-top: 6px;
            gap: 12px;
        }
    
        .g-btn {
            border: none;
            background: var(--focus);
            color: #fff;
            font-weight: 700;
            padding: 10px 16px;
            border-radius: 999px;
            cursor: pointer;
            transition: transform .05s ease, filter .2s ease;
        }
    
        .g-btn:active {
            transform: scale(.98);
        }
    
        .g-btn:hover {
            filter: brightness(.95);
        }
    
        @media (max-width: 360px) {
            .g-actions {
                flex-direction: column;
                align-items: stretch;
            }
    
            .g-btn {
                width: 100%;
            }
    
            .g-card {
                padding: 22px 18px;
            }
        }
    </style>

</body>
</html>
